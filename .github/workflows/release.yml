name: Release Launcher

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pyinstaller
      - name: Build executable
        run: |
          python build.py
      - name: Install Inno Setup
        run: choco install innosetup -y
      - name: Build installer
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME -replace '^v',''
          if (-not $version) { $version = "1.1.0" }
          iscc /DMyAppVersion=$version "installer\\windows\\TZP-Launcher.iss"
      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: installer/windows/TZP-Launcher-Windows-Setup.exe
          if-no-files-found: error

  build-universal:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create universal Python package
        run: |
          git archive --format=zip --prefix=TZP-Launcher-Universal-Python/ --output TZP-Launcher-Universal-Python.zip HEAD
      - name: Upload universal package artifact
        uses: actions/upload-artifact@v4
        with:
          name: universal-python
          path: TZP-Launcher-Universal-Python.zip

  release:
    runs-on: ubuntu-latest
    needs: [build-windows, build-universal]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/windows-installer/TZP-Launcher-Windows-Setup.exe
            artifacts/universal-python/TZP-Launcher-Universal-Python.zip
